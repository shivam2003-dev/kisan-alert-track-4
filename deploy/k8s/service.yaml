apiVersion: v1
kind: Service
metadata:
  name: kisanvani-web
  namespace: kisanvani
  annotations:
    cloud.google.com/neg: '{"exposed_ports":{"80":{"name":"kisanvani-web-80"}}}'
  labels:
    app.kubernetes.io/name: kisanvani
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kisanvani
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: 80
      targetPort: http
